<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hermes Shoes RV</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(160deg, #1a0a00 0%, #0d0d0d 50%, #1a0500 100%);
      color: #f5f0e8;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(255,120,0,0.12) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 50% 100%, rgba(255,80,0,0.07) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      padding: 48px 24px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Logo */
    .logo-wrap {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 0 40px rgba(255,120,0,0.35), 0 0 80px rgba(255,60,0,0.15);
      animation: fadeDown 0.7s ease both;
      border: 2px solid rgba(255,140,0,0.4);
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: 0.25em;
      color: #fff;
      animation: fadeDown 0.7s 0.1s ease both;
      text-align: center;
      line-height: 1;
    }

    .brand-sub {
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #ff8c00;
      margin-top: 6px;
      margin-bottom: 36px;
      animation: fadeDown 0.7s 0.2s ease both;
    }

    /* Divider */
    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      animation: fadeIn 0.7s 0.3s ease both;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,140,0,0.4), transparent);
    }
    .divider-dot {
      width: 5px;
      height: 5px;
      background: #ff8c00;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Buttons */
    .btn-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      width: 100%;
      padding: 17px 24px;
      border-radius: 4px;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-whatsapp {
      background: linear-gradient(135deg, #25D366, #128C7E);
      box-shadow: 0 4px 20px rgba(37,211,102,0.25);
      animation: fadeUp 0.6s 0.4s ease both;
      border: none;
    }
    .btn-whatsapp:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(37,211,102,0.4);
    }

    .btn-catalogo {
      background: transparent;
      border: 1.5px solid rgba(255,140,0,0.5);
      animation: fadeUp 0.6s 0.5s ease both;
    }
    .btn-catalogo:hover {
      border-color: #ff8c00;
      background: rgba(255,140,0,0.08);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255,140,0,0.15);
    }
    .btn-catalogo svg { fill: #ff8c00; }

    .btn:active { transform: translateY(0); }

    .btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      fill: #fff;
    }

    /* Footer */
    .footer {
      margin-top: 40px;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
      animation: fadeIn 1s 0.8s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Particles */
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: #ff8c00;
      opacity: 0;
      animation: float linear infinite;
    }
    @keyframes float {
      0%   { opacity: 0; transform: translateY(0) scale(1); }
      10%  { opacity: 0.3; }
      90%  { opacity: 0.1; }
      100% { opacity: 0; transform: translateY(-100vh) scale(0.4); }
    }
  </style>
</head>

    for (let i = 0; i < 16; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.bottom = '-10px';
      const size = (Math.random() * 3 + 1) + 'px';
      p.style.width = size;
      p.style.height = size;
      p.style.animationDuration = (Math.random() * 10 + 8) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      container.appendChild(p);
    }
  </script>
</body>
</html>
